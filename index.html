<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blue Noise Stippling</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./bundle.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0e1014;
        overflow: hidden;
      }

      /* The Svelte control panel mounts here as a fixed right-hand rail. */
      #ui-root {
        position: fixed;
        top: 0;
        right: 0;
        height: 100%;
        z-index: 10;
      }

      #canvas {
        position: absolute;
        top: 0;
        left: 0;
      }

      /* Hidden file inputs, clicked programmatically from the UI. */
      #input,
      #input2 {
        position: absolute;
        width: 0;
        height: 0;
        opacity: 0;
        pointer-events: none;
      }
    </style>
    <script type="module">
      import * as appstate from "./bundle.js";
      window.startapp = function () {
        appstate.start();
      };
      window.addEventListener("load", () => window.startapp());
    </script>
  </head>

  <body>
    <canvas id="canvas"></canvas>
    <div id="ui-root"></div>
    <input type="file" id="input" />
    <input type="file" id="input2" />
  </body>
</html>
